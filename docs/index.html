<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sphere Echo & Tip Agent</title>
<style>
  :root {
    --bg: #0b0b0d;
    --panel: #16130f;
    --accent: #ff6f00;
    --text: #f2ede6;
    --muted: #9a938a;
    --ok: #3ddc84;
    --err: #ff5a5a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at 50% 0%, #201810 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }
  .card {
    max-width: 480px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid #2a231a;
    border-radius: 16px;
    padding: 28px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
  }
  p.sub {
    color: var(--muted);
    margin: 0 0 24px;
    font-size: 14px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #2a231a;
    font-size: 14px;
  }
  .status.connected { color: var(--ok); font-weight: 600; }
  .status.disconnected { color: var(--muted); }
  button {
    background: var(--accent);
    color: #1a0f00;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid #3a3126;
  }
  #connectBtn { width: 100%; margin-top: 16px; }
  #actions { display: none; margin-top: 20px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input {
    width: 100%;
    background: #0f0d0a;
    border: 1px solid #3a3126;
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
  }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-row button { flex: 1; }
  #log {
    margin-top: 20px;
    max-height: 180px;
    overflow-y: auto;
    background: #0f0d0a;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .log-line { padding: 2px 0; border-bottom: 1px dashed #221d16; }
</style>
</head>
<body>
  <div class="card">
    <h1>Sphere Echo & Tip Agent</h1>
    <p class="sub">Connects to your Sphere wallet via the Sphere Connect protocol (testnet2).</p>

    <div class="row">
      <span>Status</span>
      <span id="status" class="status disconnected">Not connected</span>
    </div>
    <div class="row">
      <span>Identity</span>
      <span id="identity">—</span>
    </div>
    <div class="row">
      <span>UCT balance</span>
      <span id="balance">—</span>
    </div>

    <button id="connectBtn">Connect Sphere Wallet</button>

    <div id="actions">
      <div class="field">
        <label>Ask the bot for a tip (sends a DM)</label>
        <input id="botTag" type="text" value="@andutbot99" />
      </div>
      <div class="btn-row">
        <button id="tipRequestBtn">Send "minta tip dong" DM</button>
        <button id="refreshBtn" class="secondary">Refresh balance</button>
      </div>

      <div class="field" style="margin-top:16px;">
        <label>Send UCT directly (wallet will ask you to confirm)</label>
        <input id="sendTo" type="text" placeholder="@recipient" />
      </div>
      <div class="field">
        <input id="sendAmount" type="text" placeholder="Amount, e.g. 1" />
      </div>
      <button id="sendBtn" style="width:100%;">Send</button>
    </div>

    <div id="log"></div>
  </div>
  <script type="module" src="./bundle.js"></script>
</body>
</html>
